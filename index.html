<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TLA Open Datasets — Impact Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ─── TOKENS (sourced from the-learning-agency.com + lab) ─── */
    :root {
      --teal:    #1ea69a;
      --teal-2:  #40b797;
      --teal-3:  #00897e;
      --teal-bg: #e9f6f4;
      --orange:  #F7943B;
      --blue:    #6196ff;

      --bg:        #F8FAFC;
      --surface:   #FFFFFF;
      --ink:       #2A2A2A;
      --slate:     #54595F;
      --slate-2:   #6B7280;
      --slate-3:   #9CA3AF;
      --border:    #E5E5E5;
      --border-2:  #EFEFEF;

      --strong:    #047857; --strong-bg:   #ECFDF5;
      --moderate:  #B45309; --moderate-bg: #FFFBEB;
      --weak:      #B91C1C; --weak-bg:     #FEF2F2;
      --flagged:   #7C3AED; --flagged-bg:  #F5F3FF;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--teal); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code, .mono { font-family: 'JetBrains Mono', monospace; }

    /* ─── HEADER (two-row: nav + search) ─── */
    /* Per design/principles.md §3: search and current-view rank higher than brand;
       resolve nav crowding by ranking, not balancing. Search gets its own row. */
    header.top {
      position: sticky; top: 0; z-index: 100;
      background: rgba(248, 250, 252, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-main {
      padding: 0 1.5rem;
      height: 46px;
      display: flex; align-items: center; gap: 1rem;
    }
    .brand {
      font-weight: 700; font-size: 0.82rem;
      letter-spacing: 0; color: var(--ink);
      white-space: nowrap;
    }
    .brand .accent { color: var(--teal); }

    .nav-ds {
      display: flex; gap: 0.15rem;
      overflow-x: auto; scrollbar-width: none;
    }
    .nav-ds::-webkit-scrollbar { display: none; }
    .nav-ds a {
      color: var(--slate); font-size: 0.76rem; font-weight: 500;
      padding: 0.3rem 0.7rem; border-radius: 6px;
      white-space: nowrap; transition: all 0.12s;
    }
    .nav-ds a:hover { background: var(--border-2); color: var(--ink); text-decoration: none; }
    .nav-ds a.active { background: var(--teal); color: #fff; }

    .nav-updated {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; color: var(--slate-3);
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .nav-search-row {
      padding: 0.55rem 1.5rem 0.7rem;
      border-top: 1px solid var(--border-2);
    }
    .nav-search {
      width: 100%;
      max-width: 1180px;
      display: block; margin: 0 auto;
      padding: 0.55rem 0.9rem 0.55rem 2.4rem;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%239CA3AF'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z'/></svg>") no-repeat 0.85rem center / 16px 16px;
      font-family: inherit; font-size: 0.85rem; color: var(--ink);
      outline: none; transition: border-color 0.12s, box-shadow 0.12s;
    }
    .nav-search::placeholder { color: var(--slate-3); }
    .nav-search:focus { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-bg); }

    /* ─── LAYOUT ─── */
    main { max-width: 1180px; margin: 0 auto; padding: 0 1.5rem 4rem; }

    .empty, .loading {
      text-align: center; padding: 3rem 2rem;
      color: var(--slate-2); font-size: 0.85rem;
    }
    .show-more {
      display: flex; justify-content: center; padding: 0.85rem 0 0;
    }
    .show-more button {
      font-family: inherit; font-size: 0.78rem; font-weight: 500;
      padding: 0.45rem 1.1rem; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--slate); cursor: pointer;
    }
    .show-more button:hover { border-color: var(--teal); color: var(--teal); }
    .show-more .count { color: var(--slate-3); margin-left: 0.4rem; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--teal);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── HERO ─── */
    .hero {
      padding: 3rem 0 2.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }
    .hero-eyebrow {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--teal); margin-bottom: 0.9rem;
    }
    .hero h1 {
      font-size: clamp(1.7rem, 3.5vw, 2.3rem);
      font-weight: 700; line-height: 1.15;
      letter-spacing: -0.02em;
      max-width: 720px; margin-bottom: 0.85rem;
    }
    .hero p {
      color: var(--slate); max-width: 620px;
      font-size: 0.93rem; line-height: 1.65;
      margin-bottom: 1.75rem;
    }
    .stat-row { display: flex; gap: 2.5rem; flex-wrap: wrap; }
    .stat-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.55rem; font-weight: 500; line-height: 1;
      color: var(--ink);
    }
    .stat-lbl {
      font-size: 0.66rem; color: var(--slate-2);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-top: 0.3rem; font-weight: 600;
      display: inline-flex; align-items: center; gap: 0.3rem;
    }

    /* ─── INFO TOOLTIP (i) ─── */
    .info-tip {
      display: inline-flex; align-items: center; justify-content: center;
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--slate-3); color: #fff;
      font-size: 9px; font-weight: 700; font-style: normal;
      font-family: system-ui, sans-serif;
      cursor: help; position: relative;
      letter-spacing: 0; text-transform: none;
      transition: background 0.12s;
    }
    .info-tip:hover { background: var(--slate); }
    .info-tip::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 6px); left: 50%;
      transform: translateX(-50%);
      width: max-content; max-width: 280px;
      padding: 0.55rem 0.75rem;
      background: var(--ink); color: #F5F5F5;
      font-size: 0.72rem; font-weight: 400; font-style: normal;
      letter-spacing: 0; text-transform: none;
      border-radius: 6px; line-height: 1.5;
      white-space: normal; text-align: left;
      pointer-events: none; opacity: 0;
      transition: opacity 0.15s;
      z-index: 50; box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }
    .info-tip::before {
      content: ''; position: absolute; bottom: 100%; left: 50%;
      transform: translateX(-50%); margin-bottom: -2px;
      border: 4px solid transparent; border-top-color: var(--ink);
      opacity: 0; transition: opacity 0.15s; pointer-events: none;
    }
    .info-tip:hover::after, .info-tip:hover::before { opacity: 1; }

    /* ─── SECTIONS ─── */
    .sec-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin: 0 0 1.1rem;
    }
    .sec-head h2 {
      font-size: 0.95rem; font-weight: 700;
      letter-spacing: -0.01em; color: var(--ink);
    }
    .sec-head .meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem; color: var(--slate-3);
    }

    /* ─── DATASET CARDS ─── */
    .ds-grid {
      display: grid; gap: 0.85rem;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      margin-bottom: 2.75rem;
    }
    .ds-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--c);
      border-radius: 7px;
      padding: 1.1rem 1.2rem;
      cursor: pointer; display: block; color: inherit;
      transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
    }
    .ds-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
      text-decoration: none;
    }
    .ds-card-name {
      font-size: 0.95rem; font-weight: 700;
      color: var(--ink); margin-bottom: 0.18rem;
      letter-spacing: -0.01em;
    }
    .ds-card-year {
      font-size: 0.7rem; color: var(--slate-3);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 0.9rem;
    }
    .ds-card-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.75rem; font-weight: 500;
      color: var(--c); line-height: 1;
    }
    .ds-card-lbl {
      font-size: 0.65rem; color: var(--slate-2);
      text-transform: uppercase; letter-spacing: 0.08em;
      font-weight: 600; margin-top: 0.25rem;
    }

    /* ─── PILL ROWS ─── */
    .cross-pills, .pill-row {
      display: flex; align-items: center; gap: 0.35rem;
      flex-wrap: wrap; margin-bottom: 1.25rem;
    }
    .pill-label {
      font-size: 0.68rem; color: var(--slate-3);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-right: 0.3rem; font-weight: 600;
    }
    .pill {
      font-family: inherit; font-size: 0.76rem; font-weight: 500;
      padding: 0.32rem 0.78rem; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--slate); cursor: pointer;
      transition: all 0.12s;
    }
    .pill:hover { border-color: var(--teal); color: var(--teal); }
    .pill.on {
      background: var(--teal); border-color: var(--teal); color: #fff;
    }
    .pill-search {
      margin-left: auto;
      padding: 0.32rem 0.7rem;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--surface); font-family: inherit;
      font-size: 0.76rem; color: var(--ink); width: 200px;
      outline: none;
    }
    .pill-search:focus { border-color: var(--teal); }

    /* ─── DATASET PAGE HEADER ─── */
    .ds-header {
      padding: 2rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .back-link {
      display: inline-flex; align-items: center;
      font-size: 0.74rem; color: var(--slate-2);
      margin-bottom: 1rem;
    }
    .back-link:hover { color: var(--teal); text-decoration: none; }
    .ds-title {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 700; letter-spacing: -0.02em;
      margin-bottom: 0.25rem; color: var(--c);
    }
    .ds-doi {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.73rem; color: var(--slate-3);
      margin-bottom: 0.9rem;
    }
    .ds-desc {
      color: var(--slate); font-size: 0.9rem;
      line-height: 1.7; max-width: 720px; margin-bottom: 1.5rem;
    }

    /* ─── NARRATIVE BLURB ─── */
    .narrative {
      background: var(--teal-bg);
      border: 1px solid #c5e7e2;
      border-radius: 7px;
      padding: 1rem 1.2rem;
      margin: 1.5rem 0 0;
      max-width: 820px;
    }
    .narrative-lbl {
      font-size: 0.64rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--teal-3); margin-bottom: 0.45rem;
    }
    .narrative-text {
      font-size: 0.88rem; line-height: 1.65; color: var(--ink);
      margin-bottom: 0.7rem;
    }
    .narrative .btn-action { font-size: 0.7rem; }

    /* ─── PAPER CARDS ─── */
    .papers { display: flex; flex-direction: column; gap: 0.55rem; }

    .paper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 1rem 1.2rem;
      transition: box-shadow 0.12s, border-color 0.12s;
    }
    .paper:hover {
      border-color: #cbd5d3;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    .paper-head {
      display: flex; gap: 0.7rem;
      align-items: flex-start;
      margin-bottom: 0.4rem;
    }
    .paper-title {
      font-size: 0.92rem; font-weight: 600;
      line-height: 1.4; flex: 1;
      letter-spacing: -0.005em;
    }
    .paper-title a { color: var(--ink); }
    .paper-title a:hover { color: var(--teal); text-decoration: none; }
    .paper-badges {
      display: flex; gap: 0.3rem; flex-wrap: wrap;
      flex-shrink: 0; align-items: center;
    }
    .badge {
      display: inline-flex; align-items: center;
      font-size: 0.64rem; font-weight: 600;
      padding: 0.18rem 0.55rem; border-radius: 20px;
      white-space: nowrap; letter-spacing: 0.02em;
    }
    .b-strong { background: var(--strong-bg); color: var(--strong); }
    .b-moderate { background: var(--moderate-bg); color: var(--moderate); }
    .b-weak { background: var(--weak-bg); color: var(--weak); }
    .b-flagged { background: var(--flagged-bg); color: var(--flagged); }
    .b-new {
      background: var(--orange); color: #fff;
      font-weight: 700; letter-spacing: 0.06em;
    }
    .b-ds {
      font-weight: 700; text-decoration: none;
    }
    .b-ds:hover { text-decoration: none; opacity: 0.85; }

    .paper-meta {
      font-size: 0.74rem; color: var(--slate-2);
      margin-bottom: 0.5rem;
    }
    .paper-meta .authors {
      color: var(--ink); font-weight: 500;
    }
    .paper-takeaway {
      font-size: 0.82rem; color: var(--ink);
      line-height: 1.55;
    }

    .paper-actions {
      display: flex; gap: 0.4rem; align-items: center;
      margin-top: 0.7rem;
      padding-top: 0.65rem;
      border-top: 1px solid var(--border-2);
    }
    .btn-action {
      font-family: inherit;
      font-size: 0.72rem; font-weight: 500;
      padding: 0.3rem 0.65rem; border-radius: 5px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--slate); cursor: pointer;
      transition: all 0.1s;
    }
    .btn-action:hover {
      border-color: var(--teal); color: var(--teal);
    }
    .btn-action.copied {
      background: var(--teal); color: #fff; border-color: var(--teal);
    }

    /* ─── PAPER DETAIL PANEL ─── */
    .paper-detail {
      margin-top: 0.7rem;
      padding: 0.95rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border-2);
      border-radius: 6px;
    }
    .detail-list {
      display: grid;
      grid-template-columns: minmax(110px, max-content) 1fr;
      gap: 0.55rem 1rem;
    }
    .detail-list dt {
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--slate-2); padding-top: 0.2rem;
    }
    .detail-list dd {
      font-size: 0.83rem; line-height: 1.6;
      color: var(--ink);
    }
    .detail-list dd a { color: var(--teal); font-weight: 500; }
    .citation {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.76rem; line-height: 1.65;
      white-space: pre-wrap; color: var(--ink);
    }
    .abstract {
      font-size: 0.83rem; line-height: 1.7; color: var(--ink);
    }

    /* ─── SEARCH VIEW ─── */
    .search-head {
      padding: 1.5rem 0 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .search-head h2 {
      font-size: 1.05rem; font-weight: 700;
      color: var(--ink); margin-bottom: 0.25rem;
    }
    .search-head .meta {
      font-size: 0.78rem; color: var(--slate-2);
    }
    .search-group { margin-bottom: 1.75rem; }
    .search-group-head {
      display: flex; align-items: center; gap: 0.6rem;
      margin-bottom: 0.6rem;
      padding-bottom: 0.45rem;
      border-bottom: 1px solid var(--border-2);
    }
    .search-group-name {
      font-size: 0.78rem; font-weight: 700;
      color: var(--c);
      letter-spacing: 0.02em;
    }
    .search-group-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; color: var(--slate-3);
    }

    /* ─── DATASET ACCESS BUTTONS ─── */
    .ds-access {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      margin: 0.85rem 0 1.5rem;
    }
    .ds-access a {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 0.8rem; font-weight: 600;
      color: var(--ink); background: var(--surface);
      transition: border-color 0.12s, color 0.12s;
    }
    .ds-access a:hover {
      border-color: var(--c, var(--teal));
      color: var(--c, var(--teal));
      text-decoration: none;
    }
    .ds-access a .arrow { color: var(--slate-3); }
    .ds-access .license {
      align-self: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; color: var(--slate-3);
      letter-spacing: 0.02em;
    }

    /* ─── CITE DATASET BLOCK ─── */
    .cite-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 1rem 1.2rem;
      margin: 1.25rem 0;
      max-width: 820px;
    }
    .cite-lbl {
      font-size: 0.64rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--slate-2); margin-bottom: 0.5rem;
    }
    .cite-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem; line-height: 1.65;
      color: var(--ink);
      background: var(--bg);
      padding: 0.65rem 0.8rem; border-radius: 5px;
      white-space: pre-wrap;
      margin-bottom: 0.6rem;
    }
    .cite-text a { word-break: break-all; }

    /* ─── RECENT ADDITIONS WIDGET ─── */
    .recent-list { display: flex; flex-direction: column; gap: 0.45rem; }
    .recent-row {
      display: grid;
      grid-template-columns: max-content 1fr max-content;
      gap: 0.75rem; align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--c, var(--border));
      border-radius: 6px;
      padding: 0.65rem 0.9rem;
      font-size: 0.85rem;
    }
    .recent-row:hover { border-color: #cbd5d3; }
    .recent-row a { color: var(--ink); }
    .recent-row a:hover { color: var(--teal); text-decoration: none; }
    .recent-row .ds-chip {
      font-size: 0.66rem; font-weight: 700; letter-spacing: 0.04em;
      padding: 0.18rem 0.55rem; border-radius: 16px;
    }
    .recent-row .when {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; color: var(--slate-3);
    }
    .recent-row .ttl {
      font-size: 0.85rem; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ─── EXPORT MENU ─── */
    .export-wrap { position: relative; display: inline-block; }
    .export-btn {
      font-family: inherit; font-size: 0.75rem; font-weight: 500;
      padding: 0.32rem 0.78rem; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--slate); cursor: pointer;
      transition: all 0.12s;
    }
    .export-btn:hover { border-color: var(--teal); color: var(--teal); }
    .export-menu {
      display: none; position: absolute; top: calc(100% + 4px); right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      min-width: 180px; z-index: 30;
      overflow: hidden;
    }
    .export-menu.open { display: block; }
    .export-menu button {
      display: flex; align-items: center; gap: 0.5rem;
      width: 100%; padding: 0.55rem 0.85rem;
      font-family: inherit; font-size: 0.78rem;
      background: none; border: none; color: var(--ink);
      cursor: pointer; text-align: left;
    }
    .export-menu button:hover { background: var(--bg); color: var(--teal); }
    .export-menu .meta {
      font-size: 0.7rem; color: var(--slate-3); margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ─── PERMALINK ICON (deep-link to paper) ─── */
    .btn-permalink {
      background: none; border: none; cursor: pointer;
      font-size: 0.95rem; color: var(--slate-3);
      padding: 0 0.2rem; line-height: 1;
      transition: color 0.12s;
    }
    .btn-permalink:hover { color: var(--teal); }
    .btn-permalink.copied { color: var(--strong); }
    .paper.deep-linked {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-bg);
    }

    /* ─── ABOUT PAGE ─── */
    .about-page { max-width: 760px; padding: 2rem 0 4rem; }
    .about-page h1 {
      font-size: 1.7rem; font-weight: 700;
      letter-spacing: -0.02em; margin-bottom: 0.5rem;
    }
    .about-page .lede {

      letter-spacing: -0.01em;
    }
    .about-page p {
      color: var(--ink); font-size: 0.9rem;
      line-height: 1.75; margin-bottom: 0.85rem;
      max-width: 680px;
    }
    .about-page ul {
      margin: 0.4rem 0 1rem 1.25rem;
      font-size: 0.88rem; line-height: 1.75;
    }
    .about-page li { margin-bottom: 0.35rem; }
    .about-page code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      background: var(--bg); padding: 0.08rem 0.35rem;
      border-radius: 3px;
    }
    .about-page .source-table {
      width: 100%; border-collapse: collapse;
      margin: 0.5rem 0 1.5rem;
      font-size: 0.84rem;
    }
    .about-page .source-table th, .about-page .source-table td {
      padding: 0.5rem 0.7rem;
      text-align: left;
      border-bottom: 1px solid var(--border-2);
      vertical-align: top;
    }
    .about-page .source-table th {
      font-size: 0.66rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--slate-2);
    }
    .about-page .meta-row {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem; color: var(--slate-3);
      margin-top: 2.5rem; padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    /* ─── NAV ABOUT LINK ─── */
    .nav-about {
      font-size: 0.72rem; color: var(--slate-3);
      font-weight: 500; padding: 0.3rem 0.5rem;
      border-radius: 5px;
      margin-right: 0.4rem;
    }
    .nav-about:hover { color: var(--teal); text-decoration: none; }
    .nav-about.active { color: var(--teal); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 780px) {
      .nav-main { padding: 0 1rem; gap: 0.5rem; }
      .nav-search-row { padding: 0.5rem 1rem 0.6rem; }
      .nav-updated { display: none; }
      main { padding: 0 1rem 3rem; }
      .stat-row { gap: 1.5rem; }
      .ds-grid { grid-template-columns: 1fr; }
      .detail-list { grid-template-columns: 1fr; gap: 0.25rem 0; }
      .detail-list dt { margin-top: 0.6rem; }
    }
  </style>
</head>
<body>

<header class="top">
  <nav class="nav-main">
    <a href="#/" class="brand">TLA · <span class="accent">Impact</span></a>
    <div class="nav-ds" id="navDs"></div>
    <a href="#/about" class="nav-about" id="navAboutLink">About</a>
    <div class="nav-updated" id="navUpdated"></div>
  </nav>
  <div class="nav-search-row">
    <input class="nav-search" id="navSearch" placeholder="Search across all papers, authors, institutions, or topics…" oninput="onSearchInput(this.value)" autocomplete="off">
  </div>
</header>

<main id="app">
  <div class="loading"><span class="spinner"></span>Loading…</div>
</main>

<script>
// ── STATE ─────────────────────────────────────────────────────────
const cache = {};
let meta = null;
let allPapersCache = null;
let _crossFilter = 'all';
let _crossShowAll = false;
const CROSS_LIMIT = 30;
let _dsFilter = 'all';
let _dsSearch = '';
let _dsPapers = [];

// ── ESCAPE ────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// ── FETCHERS ──────────────────────────────────────────────────────
async function fetchJSON(path) {
  if (cache[path]) return cache[path];
  const res = await fetch(path);
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${path}`);
  cache[path] = await res.json();
  return cache[path];
}
async function loadMeta() {
  if (meta) return meta;
  meta = await fetchJSON('./data/metadata.json');
  return meta;
}
async function loadDataset(id) {
  return fetchJSON(`./data/${id}.json`);
}
async function loadAllPapers() {
  if (allPapersCache) return allPapersCache;
  const m = await loadMeta();
  const datasets = await Promise.all(
    m.datasets.map(d => loadDataset(d.id).catch(() => null))
  );
  const all = [];
  datasets.forEach((data, i) => {
    if (!data) return;
    const ds = m.datasets[i];
    (data.papers || []).forEach(p => all.push({ ...p, _ds: ds }));
  });
  allPapersCache = all;
  return all;
}

// ── ROUTING ───────────────────────────────────────────────────────
function getRoute() {
  const h = location.hash || '#/';
  if (h.startsWith('#/about')) return { page: 'about' };
  if (h.startsWith('#/dataset/')) {
    const after = h.slice(10);
    const [id, qstr] = after.split('?');
    const params = new URLSearchParams(qstr || '');
    return { page: 'dataset', id, paper: params.get('paper') || null };
  }
  if (h.startsWith('#/search')) {
    const qstr = h.split('?')[1] || '';
    const q = decodeURIComponent((qstr.match(/(?:^|&)q=([^&]*)/) || [,''])[1]);
    return { page: 'search', q };
  }
  return { page: 'home' };
}
async function route() {
  const r = getRoute();
  try {
    if (r.page === 'dataset')      await renderDataset(r.id, r.paper);
    else if (r.page === 'search')  await renderSearch(r.q);
    else if (r.page === 'about')   await renderAbout();
    else                           await renderHome();
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="loading">Failed to load.<br><small>${esc(e.message)}</small></div>`;
  }
}

// ── NAV ───────────────────────────────────────────────────────────
function buildNav(activeId) {
  const m = meta;
  if (!m) return;
  document.getElementById('navDs').innerHTML = m.datasets.map(d => {
    const isActive = d.id === activeId;
    return `<a href="#/dataset/${esc(d.id)}" class="${isActive ? 'active' : ''}">${esc(d.display_name)}</a>`;
  }).join('');
  document.getElementById('navUpdated').textContent =
    m.last_updated ? `Updated ${m.last_updated}` : '';
  const r = getRoute();
  const ns = document.getElementById('navSearch');
  if (ns && r.page !== 'search' && !ns.matches(':focus')) ns.value = '';
  const aboutLink = document.getElementById('navAboutLink');
  if (aboutLink) aboutLink.classList.toggle('active', r.page === 'about');
}

let _searchTimer = null;
function onSearchInput(val) {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    if (val.trim().length < 2) {
      if (location.hash.startsWith('#/search')) location.hash = '#/';
      return;
    }
    const q = encodeURIComponent(val.trim());
    if (!location.hash.startsWith(`#/search?q=${q}`)) {
      location.hash = `#/search?q=${q}`;
    }
  }, 220);
}

// ── ABOUT ─────────────────────────────────────────────────────────
async function renderAbout() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading"><span class="spinner"></span>Loading…</div>';
  const m = await loadMeta();
  buildNav(null);

  const total = m.datasets.reduce((s, d) => s + (d.citation_count || 0), 0);

  app.innerHTML = `
    <div class="about-page">
      <h1>About this tracker</h1>
      <p class="lede">
        The TLA Open Datasets Impact Tracker monitors how The Learning Agency's open datasets
        — PERSUADE&nbsp;2.0, PIILO, KLiCKe, ASAP&nbsp;2.0, AIDE, and Jo&nbsp;Wilder — are cited
        in academic research. As of ${esc(m.last_updated || '')}, the tracker covers
        <strong>${total} citing papers</strong> across <strong>${m.datasets.length} datasets</strong>.
      </p>

      <h2>How citations are discovered</h2>
      <p>
        Each quarter (now monthly), an automated sweep queries Google Scholar's
        "Cited by" page for each dataset's anchor paper and extracts the full list of
        citing works. Where available, paper metadata (full citation, authors,
        institutions, country) is enriched via the OpenAlex API and arXiv. For datasets
        without a peer-reviewed anchor paper, citations are tracked via search on the
        dataset's DOI or Kaggle URL.
      </p>
      <p>
        Discovery is intentionally generous: Google Scholar surfaces more citations
        than indexed-journal databases (it covers preprints, theses, and conference
        papers), at the cost of some false positives. The review step (below) filters those out.
      </p>

      <h2>How papers are reviewed</h2>
      <p>
        New citing papers go through a two-stage review before appearing on the site:
      </p>
      <ul>
        <li><strong>AI pre-judgment.</strong> For each paper, an LLM reads the abstract
          and assigns: connection strength (strong / moderate / weak), a 1–2 sentence
          interpretive takeaway, and a short research-type label. Papers with weak or
          unclear connections are flagged for manual review rather than auto-approved.</li>
        <li><strong>Human review.</strong> A TLA team member reviews AI suggestions,
          adjusts where needed, and approves or rejects each paper before it lands on
          this site. Rejected papers are remembered to prevent re-surfacing next sweep.</li>
      </ul>

      <h2>What "connection strength" means</h2>
      <table class="source-table">
        <thead><tr><th>Label</th><th>Meaning</th></tr></thead>
        <tbody>
          <tr><td><strong>Strong</strong></td><td>The paper directly uses the dataset for training, evaluation, or experiments. The abstract typically names it explicitly.</td></tr>
          <tr><td><strong>Moderate</strong></td><td>The paper references the dataset for comparison, builds on closely related methods, or treats it as a sister-resource — without using it as the experimental subject.</td></tr>
          <tr><td><strong>Weak</strong></td><td>The paper mentions the dataset peripherally — survey, related-work list, or background — with no substantive engagement.</td></tr>
        </tbody>
      </table>

      <h2>Honest caveats</h2>
      <ul>
        <li>The reviewer LLM sees only the abstract, not the full paper. Where an abstract doesn't name the dataset by name, the strength label is a hedged inference from topic + the fact that GS placed the paper in the "Cited by" cluster.</li>
        <li>Reproducibility: a different LLM run on the same abstract should produce the same bucket, but borderline moderate/weak cases are genuinely uncertain. Human reviewers correct these on a per-paper basis.</li>
        <li>The "Direct use / Reference / Incidental" counts on each dataset page are auto-derived from the strength labels. They are interpretive groupings, not verified counts.</li>
        <li>Google Scholar's "Cited by" lists are imperfect — they miss some citations and include some false positives. We rely on them as the discovery starting point, not the source of truth.</li>
      </ul>

      <h2>Open source + reproducibility</h2>
      <p>
        The site code, dataset metadata, and citation records are open at
        <a href="https://github.com/jchoi92k/TLA-Impact-Tracker" target="_blank">github.com/jchoi92k/TLA-Impact-Tracker</a>.
        Each per-paper JSON record exposes its provenance: <code>abstract_source</code>
        (openalex / arxiv_api / page_meta / manual), <code>metadata_source</code>
        (gs_scrape / tracker_pdf / manual), and <code>first_tracked</code> (which monthly sweep first added the paper).
      </p>

      <h2>Cite or reuse data from this site</h2>
      <p>
        Each dataset page includes a "Cite this dataset" block. The raw paper records
        are available in JSON at <code>/data/&lt;dataset-id&gt;.json</code> — feel free
        to fetch them for your own analyses. If you build something on top of this
        tracker, drop us a note.
      </p>

      <div class="meta-row">
        Last data refresh: ${esc(m.last_updated || '—')} &nbsp;·&nbsp;
        Next sweep due: ${esc(m.next_sweep_due || '—')} &nbsp;·&nbsp;
        Maintained by The Learning Agency
      </div>
    </div>
  `;
}

// ── HOME ──────────────────────────────────────────────────────────
async function renderHome() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading"><span class="spinner"></span>Loading…</div>';
  const m = await loadMeta();
  buildNav(null);

  const totalCites = m.datasets.reduce((s, d) => s + (d.citation_count || 0), 0);

  app.innerHTML = `
    <div class="hero">
      <div class="hero-eyebrow">TLA Open Datasets · Impact Tracker</div>
      <h1>How our open datasets are being used in research worldwide.</h1>
      <p>Tracking citations of PERSUADE 2.0, PIILO, KLiCKe, ASAP 2.0, AIDE, and Jo Wilder across academic literature. Updated monthly.</p>
      <div class="stat-row">
        <div><div class="stat-val">${totalCites}</div><div class="stat-lbl">Citations tracked</div></div>
        <div><div class="stat-val">${m.datasets.length}</div><div class="stat-lbl">Open datasets</div></div>
        <div><div class="stat-val">${esc(m.last_updated || '—')}</div><div class="stat-lbl">Last updated</div></div>
      </div>
    </div>

    <div class="sec-head">
      <h2>Datasets</h2>
      <span class="meta">Next sweep · ${esc(m.next_sweep_due || '—')}</span>
    </div>
    <div class="ds-grid">${m.datasets.map(dsCard).join('')}</div>

    <div class="sec-head" style="margin-top:2.5rem">
      <h2>Recent additions</h2>
      <span class="meta" id="recentMeta">loading…</span>
    </div>
    <div id="recentList" class="recent-list">
      <div class="loading"><span class="spinner"></span>Loading…</div>
    </div>

    <div class="sec-head" style="margin-top:2.5rem">
      <h2>Browse across datasets</h2>
      <span class="meta" id="crossMeta">loading…</span>
    </div>
    <div class="cross-pills">
      <button class="pill on" onclick="crossFilt('all', this)">All</button>
      <button class="pill" onclick="crossFilt('new', this)">New this quarter</button>
      <button class="pill" onclick="crossFilt('strong', this)">Strong</button>
      <button class="pill" onclick="crossFilt('moderate', this)">Moderate</button>
      <button class="pill" onclick="crossFilt('weak', this)">Weak</button>
    </div>
    <div id="crossList" class="papers">
      <div class="loading"><span class="spinner"></span>Loading papers…</div>
    </div>
  `;

  await loadAllPapers();
  renderRecent();
  renderCross();
}

function renderRecent() {
  const el = document.getElementById('recentList');
  const metaEl = document.getElementById('recentMeta');
  if (!el || !allPapersCache) return;
  // Sort by first_tracked (most recent first), break ties by year desc
  const sorted = allPapersCache.slice().sort((a, b) => {
    const ta = a.first_tracked || ''; const tb = b.first_tracked || '';
    if (ta !== tb) return tb.localeCompare(ta);
    return (b.year || 0) - (a.year || 0);
  });
  const recent = sorted.slice(0, 8);
  if (!recent.length) {
    el.innerHTML = '<div class="empty">No papers yet.</div>';
    if (metaEl) metaEl.textContent = '';
    return;
  }
  const newest = recent[0]?.first_tracked;
  if (metaEl) metaEl.textContent = newest ? `newest tracked ${newest}` : '';

  el.innerHTML = recent.map(p => {
    const ds = p._ds;
    const link = p.doi
      ? `https://doi.org/${esc(p.doi)}`
      : (p.gs_link || `#/dataset/${esc(ds?.id || '')}?paper=${esc(p.id)}`);
    return `
      <div class="recent-row" style="--c:${ds?.color || 'var(--border)'}">
        <a href="#/dataset/${esc(ds?.id || '')}?paper=${esc(p.id)}"
           class="ds-chip"
           style="background:${ds?.color}22;color:${ds?.color}">${esc(ds?.display_name || '')}</a>
        <a href="${esc(link)}" ${link.startsWith('#') ? '' : 'target="_blank"'} class="ttl"
           title="${esc(p.title || '')}">${esc(p.title || 'Untitled')}</a>
        <span class="when">${esc(p.first_tracked || '')} · ${esc(p.year || '')}</span>
      </div>
    `;
  }).join('');
}

function dsCard(d) {
  return `
    <a href="#/dataset/${esc(d.id)}" class="ds-card" style="--c:${d.color}">
      <div class="ds-card-name">${esc(d.display_name)}</div>
      <div class="ds-card-year">Published ${d.published_year}</div>
      <div class="ds-card-count">${d.citation_count || 0}</div>
      <div class="ds-card-lbl">Citations tracked</div>
    </a>
  `;
}

function crossFilt(val, btn) {
  _crossFilter = val;
  _crossShowAll = false;  // reset expansion when filter changes
  document.querySelectorAll('.cross-pills .pill').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderCross();
}

function crossShowAll() {
  _crossShowAll = true;
  renderCross();
}

function renderCross() {
  const el = document.getElementById('crossList');
  const metaEl = document.getElementById('crossMeta');
  if (!el || !allPapersCache) return;
  const lastSweep = meta?.last_sweep_date;

  let list = allPapersCache.slice();
  if (_crossFilter === 'strong')   list = list.filter(p => p.connection_strength === 'strong');
  else if (_crossFilter === 'moderate') list = list.filter(p => p.connection_strength === 'moderate');
  else if (_crossFilter === 'weak')     list = list.filter(p => p.connection_strength === 'weak');
  else if (_crossFilter === 'new')      list = list.filter(p => p.first_tracked === lastSweep);

  list.sort((a, b) => (b.year || 0) - (a.year || 0));
  const total = list.length;
  const truncated = !_crossShowAll && total > CROSS_LIMIT;
  if (truncated) list = list.slice(0, CROSS_LIMIT);

  if (metaEl) {
    metaEl.textContent = truncated
      ? `${CROSS_LIMIT} most recent of ${total}`
      : `${total} ${total === 1 ? 'paper' : 'papers'}`;
  }

  if (list.length === 0) {
    el.innerHTML = '<div class="empty">No papers match this filter.</div>';
    return;
  }
  const more = truncated
    ? `<div class="show-more"><button onclick="crossShowAll()">Show all<span class="count">${total - CROSS_LIMIT} more</span></button></div>`
    : '';
  el.innerHTML = list.map((p, i) => paperCard(p, `c${i}`, true)).join('') + more;
}

// ── DATASET PAGE ──────────────────────────────────────────────────
async function renderDataset(id, focusPaperId) {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading"><span class="spinner"></span>Loading…</div>';

  const [m, data] = await Promise.all([loadMeta(), loadDataset(id)]);
  buildNav(id);

  const cfg = m.datasets.find(d => d.id === id) || {};
  const color = cfg.color || 'var(--teal)';
  const s = data.summary || {};
  _dsPapers = data.papers || [];
  _dsFilter = 'all';
  _dsSearch = '';

  const doiLine = cfg.paper_doi
    ? `<div class="ds-doi">paper: <a href="https://doi.org/${esc(cfg.paper_doi)}" target="_blank">${esc(cfg.paper_doi)} ↗</a></div>`
    : '';

  // Dataset access buttons (Kaggle / DOI / license)
  const accessLinks = [];
  if (cfg.kaggle_url) {
    accessLinks.push(`<a href="${esc(cfg.kaggle_url)}" target="_blank">📊 Get the dataset on Kaggle <span class="arrow">↗</span></a>`);
  }
  if (cfg.paper_doi) {
    accessLinks.push(`<a href="https://doi.org/${esc(cfg.paper_doi)}" target="_blank">📄 Read the paper <span class="arrow">↗</span></a>`);
  }
  if (cfg.license) {
    accessLinks.push(`<span class="license">License · ${esc(cfg.license)}</span>`);
  }
  const accessHTML = accessLinks.length
    ? `<div class="ds-access" style="--c:${color}">${accessLinks.join('')}</div>`
    : '';

  const flagged = _dsPapers.filter(p => p.status === 'flagged').length;

  app.innerHTML = `
    <div class="ds-header" style="--c:${color}">
      <a href="#/" class="back-link">← All datasets</a>
      <div class="ds-title">${esc(data.meta?.display_name || id)}</div>
      ${doiLine}
      <div class="ds-desc">${esc(data.meta?.description || '')}</div>
      ${accessHTML}
      <div class="stat-row">
        <div><div class="stat-val" style="color:${color}">${s.total_citations || _dsPapers.length}</div><div class="stat-lbl">Total</div></div>
        ${s.directly_used != null ? `<div><div class="stat-val">${s.directly_used}</div><div class="stat-lbl">Direct use <span class="info-tip" data-tip="AI-judged from each paper&#39;s abstract: the paper directly uses ${esc(cfg.display_name || id)} for training, evaluation, or experiments. These three buckets (Direct / Reference / Incidental) are auto-computed from connection_strength — they&#39;re interpretive guesses, not verified counts. Override in the tracker if you disagree.">i</span></div></div>` : ''}
        ${s.reference_comparison != null ? `<div><div class="stat-val">${s.reference_comparison}</div><div class="stat-lbl">Reference <span class="info-tip" data-tip="AI-judged: the paper references ${esc(cfg.display_name || id)} for benchmarking, comparison, or builds on related methods — without directly using the dataset for experiments.">i</span></div></div>` : ''}
        ${s.incidental_peripheral != null ? `<div><div class="stat-val">${s.incidental_peripheral}</div><div class="stat-lbl">Incidental <span class="info-tip" data-tip="AI-judged: the paper mentions ${esc(cfg.display_name || id)} peripherally (in a survey, related-work list, or background section) without substantive engagement.">i</span></div></div>` : ''}
        ${flagged ? `<div><div class="stat-val" style="color:var(--flagged)">${flagged}</div><div class="stat-lbl">Flagged</div></div>` : ''}
      </div>
      <div class="narrative">
        <div class="narrative-lbl">Impact summary</div>
        <div class="narrative-text" id="narrativeText"></div>
        <button class="btn-action" onclick="copyNarrative(this)">Copy summary</button>
      </div>
      ${citeBlockHTML(cfg)}
    </div>

    <div class="pill-row">
      <span class="pill-label">Filter</span>
      <button class="pill on" onclick="dsFilt('all', this)">All (${_dsPapers.length})</button>
      <button class="pill" onclick="dsFilt('strong', this)">Strong</button>
      <button class="pill" onclick="dsFilt('moderate', this)">Moderate</button>
      <button class="pill" onclick="dsFilt('weak', this)">Weak</button>
      ${flagged ? `<button class="pill" onclick="dsFilt('flagged', this)">⚑ Flagged (${flagged})</button>` : ''}
      <input class="pill-search" type="search" placeholder="Search papers…" oninput="dsSrch(this.value)">
      <div class="export-wrap" style="margin-left:0.4rem">
        <button class="export-btn" onclick="toggleExportMenu(event)">Export ▾</button>
        <div class="export-menu" id="exportMenu">
          <button onclick="exportDataset('${esc(id)}','csv')">CSV <span class="meta">.csv</span></button>
          <button onclick="exportDataset('${esc(id)}','bibtex')">BibTeX <span class="meta">.bib</span></button>
          <button onclick="exportDataset('${esc(id)}','json')">Raw JSON <span class="meta">.json</span></button>
        </div>
      </div>
    </div>
    <div id="dsList" class="papers"></div>
  `;

  document.getElementById('narrativeText').textContent = generateNarrative(cfg, data);
  renderDsPapers();

  // Deep-link: if route specified ?paper=ID, scroll to + flash-highlight it
  if (focusPaperId) {
    setTimeout(() => focusPaper(focusPaperId), 60);
  }

  // Close export menu on outside click
  document.addEventListener('click', closeExportMenuOnOutsideClick);
}

function citeBlockHTML(cfg) {
  // Build a citation: prefer explicit citation_string from metadata, then
  // construct minimal fallback from what we know. Never invent author names.
  let body;
  if (cfg.citation_string) {
    body = `<div class="cite-text">${esc(cfg.citation_string)}</div>`;
  } else if (cfg.paper_doi) {
    body = `<div class="cite-text">Cite via DOI: <a href="https://doi.org/${esc(cfg.paper_doi)}" target="_blank">https://doi.org/${esc(cfg.paper_doi)}</a>
Use a citation manager (Zotero, Mendeley, doi.org/cite) to render in your preferred style.</div>`;
  } else if (cfg.kaggle_url) {
    body = `<div class="cite-text">Cite the dataset's Kaggle page:
${esc(cfg.kaggle_url)}

Kaggle provides a "Cite this dataset" button on the competition / dataset page itself.</div>`;
  } else {
    return '';  // nothing to cite — skip the block
  }
  return `
    <div class="cite-block">
      <div class="cite-lbl">Cite this dataset</div>
      ${body}
      <button class="btn-action" onclick="copyCiteBlock(this)">Copy citation</button>
    </div>
  `;
}

function copyCiteBlock(btn) {
  const txt = btn.parentElement.querySelector('.cite-text')?.textContent || '';
  copyText(txt.trim(), btn);
}

function focusPaper(paperId) {
  const cards = document.querySelectorAll('#dsList .paper');
  let target = null;
  cards.forEach(c => { if (c.dataset.paperId === paperId) target = c; });
  if (!target) return;
  target.scrollIntoView({ behavior: 'smooth', block: 'center' });
  target.classList.add('deep-linked');
  // Auto-expand the detail panel if not already open
  const detail = target.querySelector('.paper-detail');
  const toggleBtn = target.querySelector('.btn-action');
  if (detail && detail.style.display === 'none' && toggleBtn) toggleBtn.click();
  // Flash highlight fades after 4s
  setTimeout(() => target.classList.remove('deep-linked'), 4000);
}

function generateNarrative(cfg, data) {
  const s = data.summary || {};
  const papers = data.papers || [];
  const total = s.total_citations || papers.length;
  const years = papers.map(p => p.year).filter(Boolean).sort((a, b) => a - b);
  const yr = years.length
    ? (years[0] === years[years.length-1] ? `${years[0]}` : `${years[0]}–${years[years.length-1]}`)
    : '—';
  const direct = s.directly_used, ref = s.reference_comparison, inc = s.incidental_peripheral;

  let blurb = `${cfg.display_name} has been cited ${total} times across ${yr}.`;
  const parts = [];
  if (direct) parts.push(`${direct} ${direct === 1 ? 'paper uses' : 'papers use'} the dataset directly`);
  if (ref) parts.push(`${ref} reference it for benchmarking or comparison`);
  if (inc) parts.push(`${inc} ${inc === 1 ? 'is an incidental mention' : 'are incidental mentions'}`);
  if (parts.length) blurb += ` ${parts.join('; ')}.`;
  const countries = s.countries || [];
  if (countries.length) {
    const top = countries.slice(0, 6);
    blurb += ` Research originates from ${countries.length} ${countries.length === 1 ? 'country' : 'countries'} (${top.join(', ')}${countries.length > 6 ? ', and others' : ''}).`;
  }
  if (s.note) blurb += ` ${s.note}`;
  return blurb;
}

function copyNarrative(btn) {
  const txt = document.getElementById('narrativeText')?.textContent || '';
  copyText(txt, btn);
}

function dsFilt(val, btn) {
  _dsFilter = val;
  document.querySelectorAll('.pill-row .pill').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderDsPapers();
}
function dsSrch(val) {
  _dsSearch = val.toLowerCase();
  renderDsPapers();
}
function renderDsPapers() {
  const el = document.getElementById('dsList');
  if (!el) return;
  let list = _dsPapers;
  if (_dsFilter === 'flagged') list = list.filter(p => p.status === 'flagged');
  else if (_dsFilter !== 'all') list = list.filter(p => p.connection_strength === _dsFilter);
  if (_dsSearch) list = list.filter(p => matchesQuery(p, _dsSearch));
  if (list.length === 0) {
    el.innerHTML = '<div class="empty">No papers match this filter.</div>';
    return;
  }
  el.innerHTML = list.map((p, i) => paperCard(p, `d${i}`, false)).join('');
}

// ── SEARCH VIEW ───────────────────────────────────────────────────
async function renderSearch(query) {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading"><span class="spinner"></span>Searching…</div>';
  await loadMeta();
  buildNav(null);
  const ns = document.getElementById('navSearch');
  if (ns) ns.value = query;

  const all = await loadAllPapers();
  const q = query.toLowerCase();
  const matches = all.filter(p => matchesQuery(p, q));

  const groups = {};
  matches.forEach(p => {
    const id = p._ds?.id || 'unknown';
    (groups[id] ??= []).push(p);
  });

  let html = `
    <div class="search-head">
      <h2>Search: "${esc(query)}"</h2>
      <div class="meta">${matches.length} ${matches.length === 1 ? 'result' : 'results'} across ${Object.keys(groups).length} ${Object.keys(groups).length === 1 ? 'dataset' : 'datasets'}</div>
    </div>
  `;

  if (matches.length === 0) {
    html += '<div class="empty">No matching papers. Try a different query.</div>';
  } else {
    for (const ds of meta.datasets) {
      const list = groups[ds.id];
      if (!list?.length) continue;
      html += `
        <div class="search-group" style="--c:${ds.color}">
          <div class="search-group-head">
            <a href="#/dataset/${esc(ds.id)}" class="search-group-name">${esc(ds.display_name)}</a>
            <span class="search-group-count">${list.length} ${list.length === 1 ? 'match' : 'matches'}</span>
          </div>
          <div class="papers">${list.map((p, i) => paperCard(p, `s${ds.id}${i}`, false)).join('')}</div>
        </div>
      `;
    }
  }
  app.innerHTML = html;
}

function matchesQuery(p, q) {
  if (!q) return true;
  const fields = [
    p.title, p.venue, p.abstract,
    p.key_takeaway, p.research_type,
    Array.isArray(p.authors) ? p.authors.join(' ') : p.authors,
    Array.isArray(p.institutions) ? p.institutions.join(' ') : p.institutions,
    Array.isArray(p.country) ? p.country.join(' ') : p.country,
    p.full_citation, p.doi,
  ];
  const blob = fields.filter(Boolean).join(' ').toLowerCase();
  return q.split(/\s+/).every(term => blob.includes(term));
}

// ── PAPER CARD ────────────────────────────────────────────────────
function paperCard(p, key, showDs) {
  const lastSweep = meta?.last_sweep_date;
  const isNew = !!(lastSweep && p.first_tracked === lastSweep);

  const dsBadge = (showDs && p._ds)
    ? `<a href="#/dataset/${esc(p._ds.id)}" class="badge b-ds" style="background:${p._ds.color}20;color:${p._ds.color}">${esc(p._ds.display_name)}</a>`
    : '';

  const newPill = isNew ? '<span class="badge b-new">NEW</span>' : '';

  const strength = p.connection_strength;
  const strengthBadge =
    p.status === 'flagged' ? '<span class="badge b-flagged">⚑ Flagged</span>' :
    strength === 'strong'   ? '<span class="badge b-strong">Strong</span>' :
    strength === 'moderate' ? '<span class="badge b-moderate">Moderate</span>' :
    strength === 'weak'     ? '<span class="badge b-weak">Weak</span>' : '';

  const authors = Array.isArray(p.authors) ? p.authors.join(', ') : (p.authors || '');
  const venueParts = [p.venue, p.year].filter(Boolean);

  const hasDetail = p.full_citation || p.abstract || p.gs_link ||
    (Array.isArray(p.institutions) && p.institutions.length) ||
    (Array.isArray(p.also_cites) && p.also_cites.length);

  const titleHTML = p.doi
    ? `<a href="https://doi.org/${esc(p.doi)}" target="_blank">${esc(p.title || 'Untitled')}</a>`
    : esc(p.title || 'Untitled');

  // dataset id for the permalink button — try _ds (cross-context) then fall
  // back to p.dataset (set on per-dataset papers)
  const dsIdForLink = p._ds?.id || p.dataset || '';

  return `
    <div class="paper" id="p-${key}" data-paper-id="${esc(p.id)}">
      <div class="paper-head">
        <div class="paper-title">${titleHTML}</div>
        <div class="paper-badges">${dsBadge}${newPill}${strengthBadge}</div>
      </div>
      <div class="paper-meta">
        ${authors ? `<span class="authors">${esc(authors)}</span>` : ''}
        ${venueParts.length ? ` · ${esc(venueParts.join(', '))}` : ''}
      </div>
      ${p.key_takeaway ? `<div class="paper-takeaway">${esc(p.key_takeaway)}</div>` : ''}
      ${hasDetail ? `
        <div class="paper-actions">
          <button class="btn-action" onclick="toggleDetail('${key}', this)">Show details</button>
          ${p.full_citation ? `<button class="btn-action" onclick="copyCitation('${key}', this)">Copy citation</button>` : ''}
          ${dsIdForLink ? `<button class="btn-permalink" title="Copy link to this paper" onclick="copyPermalink('${esc(dsIdForLink)}','${esc(p.id)}', this)">🔗</button>` : ''}
        </div>
        <div class="paper-detail" id="d-${key}" style="display:none">
          ${paperDetail(p, key)}
        </div>
      ` : ''}
    </div>
  `;
}

function paperDetail(p, key) {
  const rows = [];
  if (p.full_citation) {
    rows.push(['Citation', `<div class="citation" id="cite-${key}">${esc(p.full_citation)}</div>`]);
  }
  if (p.venue) rows.push(['Venue', esc(p.venue)]);
  if (p.research_type) rows.push(['Research type', esc(p.research_type)]);
  if (Array.isArray(p.institutions) && p.institutions.length) {
    rows.push(['Institutions', p.institutions.map(esc).join(' · ')]);
  }
  if (Array.isArray(p.country) && p.country.length) {
    rows.push(['Countries', p.country.map(esc).join(', ')]);
  }
  if (Array.isArray(p.also_cites) && p.also_cites.length) {
    rows.push(['Also cites', p.also_cites.map(c =>
      `<a href="#/dataset/${esc(c)}">${esc(c.toUpperCase())}</a>`).join(' · ')]);
  }
  const links = [];
  if (p.doi)      links.push(`<a href="https://doi.org/${esc(p.doi)}" target="_blank">DOI ↗</a>`);
  if (p.gs_link)  links.push(`<a href="${esc(p.gs_link)}" target="_blank">Open paper ↗</a>`);
  if (links.length) rows.push(['Links', links.join(' · ')]);
  if (p.abstract) {
    rows.push(['Abstract', `<div class="abstract">${esc(p.abstract)}</div>`]);
  }
  if (!rows.length) return '<div class="empty">No additional details.</div>';
  return `<dl class="detail-list">${rows.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('')}</dl>`;
}

function toggleDetail(key, btn) {
  const el = document.getElementById(`d-${key}`);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  btn.textContent = open ? 'Show details' : 'Hide details';
}

function copyCitation(key, btn) {
  const el = document.getElementById(`cite-${key}`);
  if (el) copyText(el.textContent, btn);
}

// ── EXPORT (CSV / BibTeX / JSON) ──────────────────────────────────
function toggleExportMenu(e) {
  e.stopPropagation();
  document.getElementById('exportMenu')?.classList.toggle('open');
}
function closeExportMenuOnOutsideClick(e) {
  const menu = document.getElementById('exportMenu');
  if (menu && !e.target.closest('.export-wrap')) menu.classList.remove('open');
}

function downloadBlob(content, mime, filename) {
  const blob = new Blob([content], { type: mime + ';charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  document.getElementById('exportMenu')?.classList.remove('open');
}

function csvCell(v) {
  if (v == null) return '';
  if (Array.isArray(v)) v = v.join('; ');
  const s = String(v);
  // Always quote — safer when fields contain commas, newlines, quotes.
  return '"' + s.replace(/"/g, '""').replace(/\r?\n/g, ' ') + '"';
}

function exportDataset(dsId, format) {
  const cfg = meta?.datasets.find(d => d.id === dsId);
  const papers = _dsPapers || [];
  const date = new Date().toISOString().slice(0, 10);
  const safeName = dsId.replace(/[^a-z0-9_-]/gi, '_');

  if (format === 'csv') {
    const cols = ['id','title','authors','year','venue','doi','connection_strength',
                  'research_type','key_takeaway','also_cites','first_tracked','gs_link'];
    const lines = [cols.map(csvCell).join(',')];
    for (const p of papers) {
      lines.push(cols.map(c => csvCell(p[c])).join(','));
    }
    downloadBlob(lines.join('\n'), 'text/csv', `${safeName}-citations-${date}.csv`);
  }
  else if (format === 'bibtex') {
    const entries = papers.map(p => {
      const key = (p.id || 'paper').replace(/[^a-z0-9_-]/gi, '_');
      const type = p.doi ? '@article' : '@misc';
      const fields = [];
      if (p.authors) {
        const auths = Array.isArray(p.authors) ? p.authors.join(' and ') : p.authors;
        fields.push(`  author    = {${auths}}`);
      }
      if (p.title)  fields.push(`  title     = {${p.title}}`);
      if (p.venue)  fields.push(`  journal   = {${p.venue}}`);
      if (p.year)   fields.push(`  year      = {${p.year}}`);
      if (p.doi)    fields.push(`  doi       = {${p.doi}}`);
      if (p.gs_link && !p.doi) fields.push(`  url       = {${p.gs_link}}`);
      return `${type}{${key},\n${fields.join(',\n')}\n}`;
    });
    const header = `% ${cfg?.display_name || dsId} — citations exported from TLA Impact Tracker (${date})\n% ${papers.length} entries\n\n`;
    downloadBlob(header + entries.join('\n\n') + '\n', 'application/x-bibtex', `${safeName}-citations-${date}.bib`);
  }
  else if (format === 'json') {
    // Just stream the raw data file the user can already access
    const payload = JSON.stringify({ dataset: dsId, exported: date, papers }, null, 2);
    downloadBlob(payload, 'application/json', `${safeName}-citations-${date}.json`);
  }
}

// ── PERMALINK (deep-link to a paper) ──────────────────────────────
function copyPermalink(dsId, paperId, btn) {
  const url = `${location.origin}${location.pathname}#/dataset/${dsId}?paper=${paperId}`;
  copyText(url, btn);
  btn.classList.add('copied');
  setTimeout(() => btn.classList.remove('copied'), 1500);
}

function copyText(text, btn) {
  if (!text) return;
  const done = () => {
    const original = btn.textContent;
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('copied');
    }, 1400);
  };
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(done, () => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); done(); }
  catch (e) { /* swallow */ }
  document.body.removeChild(ta);
}
