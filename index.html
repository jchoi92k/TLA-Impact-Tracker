<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TLA Open Datasets — Impact Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ─── TOKENS (sourced from the-learning-agency.com + lab) ─── */
    :root {
      --teal:    #1ea69a;
      --teal-2:  #40b797;
      --teal-3:  #00897e;
      --teal-bg: #e9f6f4;
      --orange:  #F7943B;
      --blue:    #6196ff;

      --bg:        #F8FAFC;
      --surface:   #FFFFFF;
      --ink:       #2A2A2A;
      --slate:     #54595F;
      --slate-2:   #6B7280;
      --slate-3:   #9CA3AF;
      --border:    #E5E5E5;
      --border-2:  #EFEFEF;

      --strong:    #047857; --strong-bg:   #ECFDF5;
      --moderate:  #B45309; --moderate-bg: #FFFBEB;
      --weak:      #B91C1C; --weak-bg:     #FEF2F2;
      --flagged:   #7C3AED; --flagged-bg:  #F5F3FF;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--teal); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code, .mono { font-family: 'JetBrains Mono', monospace; }

    /* ─── HEADER (two-row: nav + search) ─── */
    /* Per design/principles.md §3: search and current-view rank higher than brand;
       resolve nav crowding by ranking, not balancing. Search gets its own row. */
    header.top {
      position: sticky; top: 0; z-index: 100;
      background: rgba(248, 250, 252, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-main {
      padding: 0 1.5rem;
      height: 46px;
      display: flex; align-items: center; gap: 1rem;
    }
    .brand {
      font-weight: 700; font-size: 0.82rem;
      letter-spacing: 0; color: var(--ink);
      white-space: nowrap;
    }
    .brand .accent { color: var(--teal); }

    .nav-ds {
      display: flex; gap: 0.15rem;
      overflow-x: auto; scrollbar-width: none;
    }
    .nav-ds::-webkit-scrollbar { display: none; }
    .nav-ds a {
      color: var(--slate); font-size: 0.76rem; font-weight: 500;
      padding: 0.3rem 0.7rem; border-radius: 6px;
      white-space: nowrap; transition: all 0.12s;
    }
    .nav-ds a:hover { background: var(--border-2); color: var(--ink); text-decoration: none; }
    .nav-ds a.active { background: var(--teal); color: #fff; }

    .nav-updated {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; color: var(--slate-3);
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .nav-search-row {
      padding: 0.55rem 1.5rem 0.7rem;
      border-top: 1px solid var(--border-2);
    }
    .nav-search {
      width: 100%;
      max-width: 1180px;
      display: block; margin: 0 auto;
      padding: 0.55rem 0.9rem 0.55rem 2.4rem;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%239CA3AF'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z'/></svg>") no-repeat 0.85rem center / 16px 16px;
      font-family: inherit; font-size: 0.85rem; color: var(--ink);
      outline: none; transition: border-color 0.12s, box-shadow 0.12s;
    }
    .nav-search::placeholder { color: var(--slate-3); }
    .nav-search:focus { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-bg); }

    /* ─── LAYOUT ─── */
    main { max-width: 1180px; margin: 0 auto; padding: 0 1.5rem 4rem; }

    .empty, .loading {
      text-align: center; padding: 3rem 2rem;
      color: var(--slate-2); font-size: 0.85rem;
    }
    .show-more {
      display: flex; justify-content: center; padding: 0.85rem 0 0;
    }
    .show-more button {
      font-family: inherit; font-size: 0.78rem; font-weight: 500;
      padding: 0.45rem 1.1rem; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--slate); cursor: pointer;
    }
    .show-more button:hover { border-color: var(--teal); color: var(--teal); }
    .show-more .count { color: var(--slate-3); margin-left: 0.4rem; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--teal);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── HERO ─── */
    .hero {
      padding: 3rem 0 2.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }
    .hero-eyebrow {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--teal); margin-bottom: 0.9rem;
    }
    .hero h1 {
      font-size: clamp(1.7rem, 3.5vw, 2.3rem);
      font-weight: 700; line-height: 1.15;
      letter-spacing: -0.02em;
      max-width: 720px; margin-bottom: 0.85rem;
    }
    .hero p {
      color: var(--slate); max-width: 620px;
      font-size: 0.93rem; line-height: 1.65;
      margin-bottom: 1.75rem;
    }
    .stat-row { display: flex; gap: 2.5rem; flex-wrap: wrap; }
    .stat-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.55rem; font-weight: 500; line-height: 1;
      color: var(--ink);
    }
    .stat-lbl {
      font-size: 0.66rem; color: var(--slate-2);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-top: 0.3rem; font-weight: 600;
      display: inline-flex; align-items: center; gap: 0.3rem;
    }

    /* ─── INFO TOOLTIP (i) ─── */
    .info-tip {
      display: inline-flex; align-items: center; justify-content: center;
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--slate-3); color: #fff;
      font-size: 9px; font-weight: 700; font-style: normal;
      font-family: system-ui, sans-serif;
      cursor: help; position: relative;
      letter-spacing: 0; text-transform: none;
      transition: background 0.12s;
    }
    .info-tip:hover { background: var(--slate); }
    .info-tip::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 6px); left: 50%;
      transform: translateX(-50%);
      width: max-content; max-width: 280px;
      padding: 0.55rem 0.75rem;
      background: var(--ink); color: #F5F5F5;
      font-size: 0.72rem; font-weight: 400; font-style: normal;
      letter-spacing: 0; text-transform: none;
      border-radius: 6px; line-height: 1.5;
      white-space: normal; text-align: left;
      pointer-events: none; opacity: 0;
      transition: opacity 0.15s;
      z-index: 50; box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }
    .info-tip::before {
      content: ''; position: absolute; bottom: 100%; left: 50%;
      transform: translateX(-50%); margin-bottom: -2px;
      border: 4px solid transparent; border-top-color: var(--ink);
      opacity: 0; transition: opacity 0.15s; pointer-events: none;
    }
    .info-tip:hover::after, .info-tip:hover::before { opacity: 1; }

    /* ─── SECTIONS ─── */
    .sec-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin: 0 0 1.1rem;
    }
    .sec-head h2 {
      font-size: 0.95rem; font-weight: 700;
      letter-spacing: -0.01em; color: var(--ink);
    }
    .sec-head .meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem; color: var(--slate-3);
    }

    /* ─── DATASET CARDS ─── */
    .ds-grid {
      display: grid; gap: 0.85rem;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      margin-bottom: 2.75rem;
    }
    .ds-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--c);
      border-radius: 7px;
      padding: 1.1rem 1.2rem;
      cursor: pointer; display: block; color: inherit;
      transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
    }
    .ds-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
      text-decoration: none;
    }
    .ds-card-name {
      font-size: 0.95rem; font-weight: 700;
      color: var(--ink); margin-bottom: 0.18rem;
      letter-spacing: -0.01em;
    }
    .ds-card-year {
      font-size: 0.7rem; color: var(--slate-3);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 0.9rem;
    }
    .ds-card-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.75rem; font-weight: 500;
      color: var(--c); line-height: 1;
    }
    .ds-card-lbl {
      font-size: 0.65rem; color: var(--slate-2);
      text-transform: uppercase; letter-spacing: 0.08em;
      font-weight: 600; margin-top: 0.25rem;
    }

    /* ─── PILL ROWS ─── */
    .cross-pills, .pill-row {
      display: flex; align-items: center; gap: 0.35rem;
      flex-wrap: wrap; margin-bottom: 1.25rem;
    }
    .pill-label {
      font-size: 0.68rem; color: var(--slate-3);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-right: 0.3rem; font-weight: 600;
    }
    .pill {
      font-family: inherit; font-size: 0.76rem; font-weight: 500;
      padding: 0.32rem 0.78rem; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--slate); cursor: pointer;
      transition: all 0.12s;
    }
    .pill:hover { border-color: var(--teal); color: var(--teal); }
    .pill.on {
      background: var(--teal); border-color: var(--teal); color: #fff;
    }
    .pill-search {
      margin-left: auto;
      padding: 0.32rem 0.7rem;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--surface); font-family: inherit;
      font-size: 0.76rem; color: var(--ink); width: 200px;
      outline: none;
    }
    .pill-search:focus { border-color: var(--teal); }

    /* ─── DATASET PAGE HEADER ─── */
    .ds-header {
      padding: 2rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .back-link {
      display: inline-flex; align-items: center;
      font-size: 0.74rem; color: var(--slate-2);
      margin-bottom: 1rem;
    }
    .back-link:hover { color: var(--teal); text-decoration: none; }
    .ds-title {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 700; letter-spacing: -0.02em;
      margin-bottom: 0.25rem; color: var(--c);
    }
    .ds-doi {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.73rem; color: var(--slate-3);
      margin-bottom: 0.9rem;
    }
    .ds-desc {
      color: var(--slate); font-size: 0.9rem;
      line-height: 1.7; max-width: 720px; margin-bottom: 1.5rem;
    }

    /* ─── NARRATIVE BLURB ─── */
    .narrative {
      background: var(--teal-bg);
      border: 1px solid #c5e7e2;
      border-radius: 7px;
      padding: 1rem 1.2rem;
      margin: 1.5rem 0 0;
      max-width: 820px;
    }
    .narrative-lbl {
      font-size: 0.64rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--teal-3); margin-bottom: 0.45rem;
    }
    .narrative-text {
      font-size: 0.88rem; line-height: 1.65; color: var(--ink);
      margin-bottom: 0.7rem;
    }
    .narrative .btn-action { font-size: 0.7rem; }

    /* ─── PAPER CARDS ─── */
    .papers { display: flex; flex-direction: column; gap: 0.55rem; }

    .paper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 1rem 1.2rem;
      transition: box-shadow 0.12s, border-color 0.12s;
    }
    .paper:hover {
      border-color: #cbd5d3;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    .paper-head {
      display: flex; gap: 0.7rem;
      align-items: flex-start;
      margin-bottom: 0.4rem;
    }
    .paper-title {
      font-size: 0.92rem; font-weight: 600;
      line-height: 1.4; flex: 1;
      letter-spacing: -0.005em;
    }
    .paper-title a { color: var(--ink); }
    .paper-title a:hover { color: var(--teal); text-decoration: none; }
    .paper-badges {
      display: flex; gap: 0.3rem; flex-wrap: wrap;
      flex-shrink: 0; align-items: center;
    }
    .badge {
      display: inline-flex; align-items: center;
      font-size: 0.64rem; font-weight: 600;
      padding: 0.18rem 0.55rem; border-radius: 20px;
      white-space: nowrap; letter-spacing: 0.02em;
    }
    .b-strong { background: var(--strong-bg); color: var(--strong); }
    .b-moderate { background: var(--moderate-bg); color: var(--moderate); }
    .b-weak { background: var(--weak-bg); color: var(--weak); }
    .b-flagged { background: var(--flagged-bg); color: var(--flagged); }
    .b-new {
      background: var(--orange); color: #fff;
      font-weight: 700; letter-spacing: 0.06em;
    }
    .b-ds {
      font-weight: 700; text-decoration: none;
    }
    .b-ds:hover { text-decoration: none; opacity: 0.85; }

    .paper-meta {
      font-size: 0.74rem; color: var(--slate-2);
      margin-bottom: 0.5rem;
    }
    .paper-meta .authors {
      color: var(--ink); font-weight: 500;
    }
    .paper-takeaway {
      font-size: 0.82rem; color: var(--ink);
      line-height: 1.55;
    }

    .paper-actions {
      display: flex; gap: 0.4rem; align-items: center;
      margin-top: 0.7rem;
      padding-top: 0.65rem;
      border-top: 1px solid var(--border-2);
    }
    .btn-action {
      font-family: inherit;
      font-size: 0.72rem; font-weight: 500;
      padding: 0.3rem 0.65rem; border-radius: 5px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--slate); cursor: pointer;
      transition: all 0.1s;
    }
    .btn-action:hover {
      border-color: var(--teal); color: var(--teal);
    }
    .btn-action.copied {
      background: var(--teal); color: #fff; border-color: var(--teal);
    }

    /* ─── PAPER DETAIL PANEL ─── */
    .paper-detail {
      margin-top: 0.7rem;
      padding: 0.95rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border-2);
      border-radius: 6px;
    }
    .detail-list {
      display: grid;
      grid-template-columns: minmax(110px, max-content) 1fr;
      gap: 0.55rem 1rem;
    }
    .detail-list dt {
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--slate-2); padding-top: 0.2rem;
    }
    .detail-list dd {
      font-size: 0.83rem; line-height: 1.6;
      color: var(--ink);
    }
    .detail-list dd a { color: var(--teal); font-weight: 500; }
    .citation {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.76rem; line-height: 1.65;
      white-space: pre-wrap; color: var(--ink);
    }
    .abstract {
      font-size: 0.83rem; line-height: 1.7; color: var(--ink);
    }

    /* ─── SEARCH VIEW ─── */
    .search-head {
      padding: 1.5rem 0 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .search-head h2 {
      font-size: 1.05rem; font-weight: 700;
      color: var(--ink); margin-bottom: 0.25rem;
    }
    .search-head .meta {
      font-size: 0.78rem; color: var(--slate-2);
    }
    .search-group { margin-bottom: 1.75rem; }
    .search-group-head {
      display: flex; align-items: center; gap: 0.6rem;
      margin-bottom: 0.6rem;
      padding-bottom: 0.45rem;
      border-bottom: 1px solid var(--border-2);
    }
    .search-group-name {
      font-size: 0.78rem; font-weight: 700;
      color: var(--c);
      letter-spacing: 0.02em;
    }
    .search-group-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; color: var(--slate-3);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 780px) {
      .nav-main { padding: 0 1rem; gap: 0.5rem; }
      .nav-search-row { padding: 0.5rem 1rem 0.6rem; }
      .nav-updated { display: none; }
      main { padding: 0 1rem 3rem; }
      .stat-row { gap: 1.5rem; }
      .ds-grid { grid-template-columns: 1fr; }
      .detail-list { grid-template-columns: 1fr; gap: 0.25rem 0; }
      .detail-list dt { margin-top: 0.6rem; }
    }
  </style>
</head>
<body>

<header class="top">
  <nav class="nav-main">
    <a href="#/" class="brand">TLA · <span class="accent">Impact</span></a>
    <div class="nav-ds" id="navDs"></div>
    <div class="nav-updated" id="navUpdated"></div>
  </nav>
  <div class="nav-search-row">
    <input class="nav-search" id="navSearch" placeholder="Search across all papers, authors, institutions, or topics…" oninput="onSearchInput(this.value)" autocomplete="off">
  </div>
</header>

<main id="app">
  <div class="loading"><span class="spinner"></span>Loading…</div>
</main>

<script>
// ── STATE ─────────────────────────────────────────────────────────
const cache = {};
let meta = null;
let allPapersCache = null;
let _crossFilter = 'all';
let _crossShowAll = false;
const CROSS_LIMIT = 30;
let _dsFilter = 'all';
let _dsSearch = '';
let _dsPapers = [];

// ── ESCAPE ────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// ── FETCHERS ──────────────────────────────────────────────────────
async function fetchJSON(path) {
  if (cache[path]) return cache[path];
  const res = await fetch(path);
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${path}`);
  cache[path] = await res.json();
  return cache[path];
}
async function loadMeta() {
  if (meta) return meta;
  meta = await fetchJSON('./data/metadata.json');
  return meta;
}
async function loadDataset(id) {
  return fetchJSON(`./data/${id}.json`);
}
async function loadAllPapers() {
  if (allPapersCache) return allPapersCache;
  const m = await loadMeta();
  const datasets = await Promise.all(
    m.datasets.map(d => loadDataset(d.id).catch(() => null))
  );
  const all = [];
  datasets.forEach((data, i) => {
    if (!data) return;
    const ds = m.datasets[i];
    (data.papers || []).forEach(p => all.push({ ...p, _ds: ds }));
  });
  allPapersCache = all;
  return all;
}

// ── ROUTING ───────────────────────────────────────────────────────
function getRoute() {
  const h = location.hash || '#/';
  if (h.startsWith('#/dataset/')) return { page: 'dataset', id: h.slice(10) };
  if (h.startsWith('#/search')) {
    const qstr = h.split('?')[1] || '';
    const q = decodeURIComponent((qstr.match(/(?:^|&)q=([^&]*)/) || [,''])[1]);
    return { page: 'search', q };
  }
  return { page: 'home' };
}
async function route() {
  const r = getRoute();
  try {
    if (r.page === 'dataset')      await renderDataset(r.id);
    else if (r.page === 'search')  await renderSearch(r.q);
    else                           await renderHome();
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="loading">Failed to load.<br><small>${esc(e.message)}</small></div>`;
  }
}

// ── NAV ───────────────────────────────────────────────────────────
function buildNav(activeId) {
  const m = meta;
  if (!m) return;
  document.getElementById('navDs').innerHTML = m.datasets.map(d => {
    const isActive = d.id === activeId;
    return `<a href="#/dataset/${esc(d.id)}" class="${isActive ? 'active' : ''}">${esc(d.display_name)}</a>`;
  }).join('');
  document.getElementById('navUpdated').textContent =
    m.last_updated ? `Updated ${m.last_updated}` : '';
  const r = getRoute();
  const ns = document.getElementById('navSearch');
  if (ns && r.page !== 'search' && !ns.matches(':focus')) ns.value = '';
}

let _searchTimer = null;
function onSearchInput(val) {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    if (val.trim().length < 2) {
      if (location.hash.startsWith('#/search')) location.hash = '#/';
      return;
    }
    const q = encodeURIComponent(val.trim());
    if (!location.hash.startsWith(`#/search?q=${q}`)) {
      location.hash = `#/search?q=${q}`;
    }
  }, 220);
}

// ── HOME ──────────────────────────────────────────────────────────
async function renderHome() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading"><span class="spinner"></span>Loading…</div>';
  const m = await loadMeta();
  buildNav(null);

  const totalCites = m.datasets.reduce((s, d) => s + (d.citation_count || 0), 0);

  app.innerHTML = `
    <div class="hero">
      <div class="hero-eyebrow">TLA Open Datasets · Impact Tracker</div>
      <h1>How our open datasets are being used in research worldwide.</h1>
      <p>Tracking citations of PERSUADE 2.0, PIILO, KLiCKe, ASAP 2.0, AIDE, and Jo Wilder across academic literature. Updated monthly.</p>
      <div class="stat-row">
        <div><div class="stat-val">${totalCites}</div><div class="stat-lbl">Citations tracked</div></div>
        <div><div class="stat-val">${m.datasets.length}</div><div class="stat-lbl">Open datasets</div></div>
        <div><div class="stat-val">${esc(m.last_updated || '—')}</div><div class="stat-lbl">Last updated</div></div>
      </div>
    </div>

    <div class="sec-head">
      <h2>Datasets</h2>
      <span class="meta">Next sweep · ${esc(m.next_sweep_due || '—')}</span>
    </div>
    <div class="ds-grid">${m.datasets.map(dsCard).join('')}</div>

    <div class="sec-head" style="margin-top:2.5rem">
      <h2>Browse across datasets</h2>
      <span class="meta" id="crossMeta">loading…</span>
    </div>
    <div class="cross-pills">
      <button class="pill on" onclick="crossFilt('all', this)">All</button>
      <button class="pill" onclick="crossFilt('new', this)">New this quarter</button>
      <button class="pill" onclick="crossFilt('strong', this)">Strong</button>
      <button class="pill" onclick="crossFilt('moderate', this)">Moderate</button>
      <button class="pill" onclick="crossFilt('weak', this)">Weak</button>
    </div>
    <div id="crossList" class="papers">
      <div class="loading"><span class="spinner"></span>Loading papers…</div>
    </div>
  `;

  await loadAllPapers();
  renderCross();
}

function dsCard(d) {
  return `
    <a href="#/dataset/${esc(d.id)}" class="ds-card" style="--c:${d.color}">
      <div class="ds-card-name">${esc(d.display_name)}</div>
      <div class="ds-card-year">Published ${d.published_year}</div>
      <div class="ds-card-count">${d.citation_count || 0}</div>
      <div class="ds-card-lbl">Citations tracked</div>
    </a>
  `;
}

function crossFilt(val, btn) {
  _crossFilter = val;
  _crossShowAll = false;  // reset expansion when filter changes
  document.querySelectorAll('.cross-pills .pill').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderCross();
}

function crossShowAll() {
  _crossShowAll = true;
  renderCross();
}

function renderCross() {
  const el = document.getElementById('crossList');
  const metaEl = document.getElementById('crossMeta');
  if (!el || !allPapersCache) return;
  const lastSweep = meta?.last_sweep_date;

  let list = allPapersCache.slice();
  if (_crossFilter === 'strong')   list = list.filter(p => p.connection_strength === 'strong');
  else if (_crossFilter === 'moderate') list = list.filter(p => p.connection_strength === 'moderate');
  else if (_crossFilter === 'weak')     list = list.filter(p => p.connection_strength === 'weak');
  else if (_crossFilter === 'new')      list = list.filter(p => p.first_tracked === lastSweep);

  list.sort((a, b) => (b.year || 0) - (a.year || 0));
  const total = list.length;
  const truncated = !_crossShowAll && total > CROSS_LIMIT;
  if (truncated) list = list.slice(0, CROSS_LIMIT);

  if (metaEl) {
    metaEl.textContent = truncated
      ? `${CROSS_LIMIT} most recent of ${total}`
      : `${total} ${total === 1 ? 'paper' : 'papers'}`;
  }

  if (list.length === 0) {
    el.innerHTML = '<div class="empty">No papers match this filter.</div>';
    return;
  }
  const more = truncated
    ? `<div class="show-more"><button onclick="crossShowAll()">Show all<span class="count">${total - CROSS_LIMIT} more</span></button></div>`
    : '';
  el.innerHTML = list.map((p, i) => paperCard(p, `c${i}`, true)).join('') + more;
}

// ── DATASET PAGE ──────────────────────────────────────────────────
async function renderDataset(id) {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading"><span class="spinner"></span>Loading…</div>';

  const [m, data] = await Promise.all([loadMeta(), loadDataset(id)]);
  buildNav(id);

  const cfg = m.datasets.find(d => d.id === id) || {};
  const color = cfg.color || 'var(--teal)';
  const s = data.summary || {};
  _dsPapers = data.papers || [];
  _dsFilter = 'all';
  _dsSearch = '';

  const doiLine = data.meta?.paper_doi
    ? `<div class="ds-doi">paper: <a href="https://doi.org/${esc(data.meta.paper_doi)}" target="_blank">${esc(data.meta.paper_doi)} ↗</a></div>`
    : '';

  const flagged = _dsPapers.filter(p => p.status === 'flagged').length;

  app.innerHTML = `
    <div class="ds-header" style="--c:${color}">
      <a href="#/" class="back-link">← All datasets</a>
      <div class="ds-title">${esc(data.meta?.display_name || id)}</div>
      ${doiLine}
      <div class="ds-desc">${esc(data.meta?.description || '')}</div>
      <div class="stat-row">
        <div><div class="stat-val" style="color:${color}">${s.total_citations || _dsPapers.length}</div><div class="stat-lbl">Total</div></div>
        ${s.directly_used != null ? `<div><div class="stat-val">${s.directly_used}</div><div class="stat-lbl">Direct use <span class="info-tip" data-tip="AI-judged from each paper&#39;s abstract: the paper directly uses ${esc(cfg.display_name || id)} for training, evaluation, or experiments. These three buckets (Direct / Reference / Incidental) are auto-computed from connection_strength — they&#39;re interpretive guesses, not verified counts. Override in the tracker if you disagree.">i</span></div></div>` : ''}
        ${s.reference_comparison != null ? `<div><div class="stat-val">${s.reference_comparison}</div><div class="stat-lbl">Reference <span class="info-tip" data-tip="AI-judged: the paper references ${esc(cfg.display_name || id)} for benchmarking, comparison, or builds on related methods — without directly using the dataset for experiments.">i</span></div></div>` : ''}
        ${s.incidental_peripheral != null ? `<div><div class="stat-val">${s.incidental_peripheral}</div><div class="stat-lbl">Incidental <span class="info-tip" data-tip="AI-judged: the paper mentions ${esc(cfg.display_name || id)} peripherally (in a survey, related-work list, or background section) without substantive engagement.">i</span></div></div>` : ''}
        ${flagged ? `<div><div class="stat-val" style="color:var(--flagged)">${flagged}</div><div class="stat-lbl">Flagged</div></div>` : ''}
      </div>
      <div class="narrative">
        <div class="narrative-lbl">Impact summary</div>
        <div class="narrative-text" id="narrativeText"></div>
        <button class="btn-action" onclick="copyNarrative(this)">Copy summary</button>
      </div>
    </div>

    <div class="pill-row">
      <span class="pill-label">Filter</span>
      <button class="pill on" onclick="dsFilt('all', this)">All (${_dsPapers.length})</button>
      <button class="pill" onclick="dsFilt('strong', this)">Strong</button>
      <button class="pill" onclick="dsFilt('moderate', this)">Moderate</button>
      <button class="pill" onclick="dsFilt('weak', this)">Weak</button>
      ${flagged ? `<button class="pill" onclick="dsFilt('flagged', this)">⚑ Flagged (${flagged})</button>` : ''}
      <input class="pill-search" type="search" placeholder="Search papers…" oninput="dsSrch(this.value)">
    </div>
    <div id="dsList" class="papers"></div>
  `;

  document.getElementById('narrativeText').textContent = generateNarrative(cfg, data);
  renderDsPapers();
}

function generateNarrative(cfg, data) {
  const s = data.summary || {};
  const papers = data.papers || [];
  const total = s.total_citations || papers.length;
  const years = papers.map(p => p.year).filter(Boolean).sort((a, b) => a - b);
  const yr = years.length
    ? (years[0] === years[years.length-1] ? `${years[0]}` : `${years[0]}–${years[years.length-1]}`)
    : '—';
  const direct = s.directly_used, ref = s.reference_comparison, inc = s.incidental_peripheral;

  let blurb = `${cfg.display_name} has been cited ${total} times across ${yr}.`;
  const parts = [];
  if (direct) parts.push(`${direct} ${direct === 1 ? 'paper uses' : 'papers use'} the dataset directly`);
  if (ref) parts.push(`${ref} reference it for benchmarking or comparison`);
  if (inc) parts.push(`${inc} ${inc === 1 ? 'is an incidental mention' : 'are incidental mentions'}`);
  if (parts.length) blurb += ` ${parts.join('; ')}.`;
  const countries = s.countries || [];
  if (countries.length) {
    const top = countries.slice(0, 6);
    blurb += ` Research originates from ${countries.length} ${countries.length === 1 ? 'country' : 'countries'} (${top.join(', ')}${countries.length > 6 ? ', and others' : ''}).`;
  }
  if (s.note) blurb += ` ${s.note}`;
  return blurb;
}

function copyNarrative(btn) {
  const txt = document.getElementById('narrativeText')?.textContent || '';
  copyText(txt, btn);
}

function dsFilt(val, btn) {
  _dsFilter = val;
  document.querySelectorAll('.pill-row .pill').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderDsPapers();
}
function dsSrch(val) {
  _dsSearch = val.toLowerCase();
  renderDsPapers();
}
function renderDsPapers() {
  const el = document.getElementById('dsList');
  if (!el) return;
  let list = _dsPapers;
  if (_dsFilter === 'flagged') list = list.filter(p => p.status === 'flagged');
  else if (_dsFilter !== 'all') list = list.filter(p => p.connection_strength === _dsFilter);
  if (_dsSearch) list = list.filter(p => matchesQuery(p, _dsSearch));
  if (list.length === 0) {
    el.innerHTML = '<div class="empty">No papers match this filter.</div>';
    return;
  }
  el.innerHTML = list.map((p, i) => paperCard(p, `d${i}`, false)).join('');
}

// ── SEARCH VIEW ───────────────────────────────────────────────────
async function renderSearch(query) {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading"><span class="spinner"></span>Searching…</div>';
  await loadMeta();
  buildNav(null);
  const ns = document.getElementById('navSearch');
  if (ns) ns.value = query;

  const all = await loadAllPapers();
  const q = query.toLowerCase();
  const matches = all.filter(p => matchesQuery(p, q));

  const groups = {};
  matches.forEach(p => {
    const id = p._ds?.id || 'unknown';
    (groups[id] ??= []).push(p);
  });

  let html = `
    <div class="search-head">
      <h2>Search: "${esc(query)}"</h2>
      <div class="meta">${matches.length} ${matches.length === 1 ? 'result' : 'results'} across ${Object.keys(groups).length} ${Object.keys(groups).length === 1 ? 'dataset' : 'datasets'}</div>
    </div>
  `;

  if (matches.length === 0) {
    html += '<div class="empty">No matching papers. Try a different query.</div>';
  } else {
    for (const ds of meta.datasets) {
      const list = groups[ds.id];
      if (!list?.length) continue;
      html += `
        <div class="search-group" style="--c:${ds.color}">
          <div class="search-group-head">
            <a href="#/dataset/${esc(ds.id)}" class="search-group-name">${esc(ds.display_name)}</a>
            <span class="search-group-count">${list.length} ${list.length === 1 ? 'match' : 'matches'}</span>
          </div>
          <div class="papers">${list.map((p, i) => paperCard(p, `s${ds.id}${i}`, false)).join('')}</div>
        </div>
      `;
    }
  }
  app.innerHTML = html;
}

function matchesQuery(p, q) {
  if (!q) return true;
  const fields = [
    p.title, p.venue, p.abstract,
    p.key_takeaway, p.research_type,
    Array.isArray(p.authors) ? p.authors.join(' ') : p.authors,
    Array.isArray(p.institutions) ? p.institutions.join(' ') : p.institutions,
    Array.isArray(p.country) ? p.country.join(' ') : p.country,
    p.full_citation, p.doi,
  ];
  const blob = fields.filter(Boolean).join(' ').toLowerCase();
  return q.split(/\s+/).every(term => blob.includes(term));
}

// ── PAPER CARD ────────────────────────────────────────────────────
function paperCard(p, key, showDs) {
  const lastSweep = meta?.last_sweep_date;
  const isNew = !!(lastSweep && p.first_tracked === lastSweep);

  const dsBadge = (showDs && p._ds)
    ? `<a href="#/dataset/${esc(p._ds.id)}" class="badge b-ds" style="background:${p._ds.color}20;color:${p._ds.color}">${esc(p._ds.display_name)}</a>`
    : '';

  const newPill = isNew ? '<span class="badge b-new">NEW</span>' : '';

  const strength = p.connection_strength;
  const strengthBadge =
    p.status === 'flagged' ? '<span class="badge b-flagged">⚑ Flagged</span>' :
    strength === 'strong'   ? '<span class="badge b-strong">Strong</span>' :
    strength === 'moderate' ? '<span class="badge b-moderate">Moderate</span>' :
    strength === 'weak'     ? '<span class="badge b-weak">Weak</span>' : '';

  const authors = Array.isArray(p.authors) ? p.authors.join(', ') : (p.authors || '');
  const venueParts = [p.venue, p.year].filter(Boolean);

  const hasDetail = p.full_citation || p.abstract || p.gs_link ||
    (Array.isArray(p.institutions) && p.institutions.length) ||
    (Array.isArray(p.also_cites) && p.also_cites.length);

  const titleHTML = p.doi
    ? `<a href="https://doi.org/${esc(p.doi)}" target="_blank">${esc(p.title || 'Untitled')}</a>`
    : esc(p.title || 'Untitled');

  return `
    <div class="paper" id="p-${key}">
      <div class="paper-head">
        <div class="paper-title">${titleHTML}</div>
        <div class="paper-badges">${dsBadge}${newPill}${strengthBadge}</div>
      </div>
      <div class="paper-meta">
        ${authors ? `<span class="authors">${esc(authors)}</span>` : ''}
        ${venueParts.length ? ` · ${esc(venueParts.join(', '))}` : ''}
      </div>
      ${p.key_takeaway ? `<div class="paper-takeaway">${esc(p.key_takeaway)}</div>` : ''}
      ${hasDetail ? `
        <div class="paper-actions">
          <button class="btn-action" onclick="toggleDetail('${key}', this)">Show details</button>
          ${p.full_citation ? `<button class="btn-action" onclick="copyCitation('${key}', this)">Copy citation</button>` : ''}
        </div>
        <div class="paper-detail" id="d-${key}" style="display:none">
          ${paperDetail(p, key)}
        </div>
      ` : ''}
    </div>
  `;
}

function paperDetail(p, key) {
  const rows = [];
  if (p.full_citation) {
    rows.push(['Citation', `<div class="citation" id="cite-${key}">${esc(p.full_citation)}</div>`]);
  }
  if (p.venue) rows.push(['Venue', esc(p.venue)]);
  if (p.research_type) rows.push(['Research type', esc(p.research_type)]);
  if (Array.isArray(p.institutions) && p.institutions.length) {
    rows.push(['Institutions', p.institutions.map(esc).join(' · ')]);
  }
  if (Array.isArray(p.country) && p.country.length) {
    rows.push(['Countries', p.country.map(esc).join(', ')]);
  }
  if (Array.isArray(p.also_cites) && p.also_cites.length) {
    rows.push(['Also cites', p.also_cites.map(c =>
      `<a href="#/dataset/${esc(c)}">${esc(c.toUpperCase())}</a>`).join(' · ')]);
  }
  const links = [];
  if (p.doi)      links.push(`<a href="https://doi.org/${esc(p.doi)}" target="_blank">DOI ↗</a>`);
  if (p.gs_link)  links.push(`<a href="${esc(p.gs_link)}" target="_blank">Open paper ↗</a>`);
  if (links.length) rows.push(['Links', links.join(' · ')]);
  if (p.abstract) {
    rows.push(['Abstract', `<div class="abstract">${esc(p.abstract)}</div>`]);
  }
  if (!rows.length) return '<div class="empty">No additional details.</div>';
  return `<dl class="detail-list">${rows.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('')}</dl>`;
}

function toggleDetail(key, btn) {
  const el = document.getElementById(`d-${key}`);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  btn.textContent = open ? 'Show details' : 'Hide details';
}

function copyCitation(key, btn) {
  const el = document.getElementById(`cite-${key}`);
  if (el) copyText(el.textContent, btn);
}

function copyText(text, btn) {
  if (!text) return;
  const done = () => {
    const original = btn.textContent;
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('copied');
    }, 1400);
  };
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(done, () => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); done(); }
  catch (e) { /* swallow */ }
  document.body.removeChild(ta);
}

// ── INIT ──────────────────────────────────────────────────────────
window.addEventListener('hashchange', route);
route();
</script>
